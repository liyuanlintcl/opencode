name: Build Omni Studio Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_tauri:
        description: "Build Tauri desktop"
        type: boolean
        default: true
      build_electron:
        description: "Build Electron desktop"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    if: ${{ github.event.inputs.build_tauri != 'false' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: x86_64-pc-windows-msvc

      - name: Install project dependencies
        run: bun install

      - name: Build CLI sidecar
        run: |
          cd packages/opencode
          bun run build --single

      - name: Prepare sidecar for Tauri
        shell: pwsh
        run: |
          $sidecarDir = "packages/desktop/src-tauri/sidecars"
          New-Item -ItemType Directory -Force -Path $sidecarDir
          Copy-Item "packages/opencode/dist/opencode-windows-x64/bin/opencode.exe" `
            "$sidecarDir/opencode-cli-x86_64-pc-windows-msvc.exe"

      - name: Patch build script to skip typecheck
        shell: pwsh
        run: |
          $pkg = Get-Content "packages/desktop/package.json" -Raw
          $pkg = $pkg.Replace('"build": "bun run typecheck && vite build"', '"build": "vite build"')
          Set-Content "packages/desktop/package.json" $pkg -NoNewline

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/desktop
          args: --target x86_64-pc-windows-msvc --verbose
          uploadWorkflowArtifacts: false
          releaseDraft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omni-studio-tauri-windows
          path: packages/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*

  build-electron:
    if: ${{ github.event.inputs.build_electron != 'false' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install project dependencies
        run: bun install

      - name: Build Electron
        run: |
          cd packages/desktop-electron
          bun run build
        env:
          OPENCODE_CHANNEL: dev

      - name: Package Electron
        run: |
          cd packages/desktop-electron
          npx electron-builder --win --publish never --config electron-builder.config.ts
        env:
          OPENCODE_CHANNEL: dev

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omni-studio-electron-windows
          path: packages/desktop-electron/dist/*
