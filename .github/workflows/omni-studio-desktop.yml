name: Build Omni Studio Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_tauri:
        description: "Build Tauri desktop"
        type: boolean
        default: true
      build_electron:
        description: "Build Electron desktop"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    if: ${{ github.event.inputs.build_tauri != 'false' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install project dependencies
        run: bun install

      - name: Build CLI sidecar
        run: |
          cd packages/opencode
          bun run build --single

      - name: Prepare sidecar for Tauri
        run: |
          cd packages/desktop
          bun ./scripts/predev.ts
        env:
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/desktop
          args: --target ${{ matrix.target }} --verbose
          uploadWorkflowArtifacts: true
          releaseDraft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-electron:
    if: ${{ github.event.inputs.build_electron != 'false' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_flag: --mac
          - os: ubuntu-latest
            platform_flag: --linux
          - os: windows-latest
            platform_flag: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies (Ubuntu)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm

      - name: Install project dependencies
        run: bun install

      - name: Build Electron
        run: |
          cd packages/desktop-electron
          bun run build
        env:
          OPENCODE_CHANNEL: dev

      - name: Package Electron
        run: |
          cd packages/desktop-electron
          npx electron-builder ${{ matrix.platform_flag }} --publish never --config electron-builder.config.ts
        env:
          OPENCODE_CHANNEL: dev

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omni-studio-electron-${{ matrix.os }}
          path: packages/desktop-electron/dist/*
